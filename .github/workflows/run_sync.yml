name: Ideer Parser Service

on:
  workflow_dispatch: # Для ручного запуска из интерфейса GitHub
  repository_dispatch:
    types: [ trigger_pipeline ] # Этот хук мы будем вызывать из cron-job

jobs:
  run-parser:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cloudscraper beautifulsoup4

    - name: Run parser
      env:
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: python parser.py

    - name: Commit and Push changes if last_id updated
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add last_id.txt
        if ! git diff --cached --quiet; then
          git commit -m "Update last parsed post ID [skip ci]"
          git push
        else
          echo "No changes in last_id.txt"
        fi
